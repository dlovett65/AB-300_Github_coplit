name: Build and Test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build and Test

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/packages.lock.json

      - name: Restore dependencies
        run: dotnet restore AB300.slnx

      - name: Build solution
        run: dotnet build AB300.slnx --no-restore --configuration Release

      - name: Run tests with coverage
        run: dotnet test tests/AB300.Web.Tests/AB300.Web.Tests.csproj --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --settings coverage.runsettings

      - name: Publish web application
        run: dotnet publish code/AB300.Web/AB300.Web.csproj --configuration Release --output ./publish --no-restore

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AB300.Web-release
          path: ./publish
          if-no-files-found: error
          retention-days: 30

      - name: Test Report
        if: always()
        run: |
          echo "## Build and Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "Build completed successfully!" >> $GITHUB_STEP_SUMMARY
